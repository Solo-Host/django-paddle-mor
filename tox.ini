[tox]
requires = tox>=4.28
env_list =
    py311
    py312
    py313
    ruff
    mypy
skip_missing_interpreters = true

[testenv]
description = Run the pytest suite
extras = dev
commands =
    pytest {posargs:tests}

[testenv:ruff]
description = Run Ruff lint checks
extras = dev
commands =
    ruff check {posargs:django_paddle_mor tests}

[testenv:mypy]
description = Run mypy type checks
extras = dev
commands =
    mypy {posargs:django_paddle_mor tests}
